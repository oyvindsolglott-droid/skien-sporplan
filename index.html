<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Skien sporplan</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
margin:0;
background:#f4f5f7;
}

.app{
max-width:1200px;
margin:auto;
padding:10px;
}

.segmented{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:6px;
margin-bottom:10px;
}

.segmented button{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
font-weight:600;
}

.panel{
display:none;
}

.panel.active{
display:block;
}

.yard-grid{
display:grid;
grid-template-columns:repeat(14,78px);
gap:6px;
}

.slot{
border:2px solid black;
border-radius:7px;
min-height:90px;
display:flex;
align-items:center;
justify-content:center;
white-space:pre-line;
font-weight:700;
text-align:center;
}

.slot.empty.blue{background:#d9eaf7;color:#7d97bf}
.slot.empty.yellow{background:#fff200;color:#9a9100}
.slot.empty.orange{background:#f3e2d2;color:#b97b44}

.slot.filled{background:#bfbfbf}
.slot.wash-filled{background:#f3e2d2}

.platform{
background:#d99694;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

</style>
</head>

<body>

<div class="app">

<h2>Skien sporplan</h2>

<div class="segmented">
<button onclick="show('sporplan')">Sporplan</button>
<button onclick="show('turneringKveld')">Turnering Kveld</button>
<button onclick="show('turneringNatt')">Turnering Natt</button>
<button onclick="show('inndata')">Inndata</button>
</div>

<div id="sporplan" class="panel active">
<div class="yard-grid" id="yard"></div>
</div>

<div id="turneringKveld" class="panel">
Turnering kveld
</div>

<div id="turneringNatt" class="panel">
Turnering natt
</div>

<div id="inndata" class="panel">
Inndata
</div>

</div>

<script>

function show(id){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

const topRow=["12N","11N","10N","9","8N","7N","platform","6N","5N","4N","3N","platform","2N","1N"]

const midRow=["12S","11S","10S",null,"8S","7S","platform","6S","5M","4M","3M","platform","2S","1S"]

const botRow=[null,null,null,null,"8SS","7SS","platform","6SS","5S","4S","3S",null,null,null]

function kind(slot){

if(!slot)return

if(slot.endsWith("N")||slot==="9")return"blue"

if(slot.endsWith("M"))return"yellow"

return"orange"

}

let data={}

function draw(row){

row.forEach(s=>{

if(s==="platform"){
let d=document.createElement("div")
d.className="platform"
d.innerText="Plattform"
yard.appendChild(d)
return
}

if(!s){
let d=document.createElement("div")
yard.appendChild(d)
return
}

let info=data[s]||{tog:"",mat:"",wash:false}

let filled=(info.tog||info.mat)

let d=document.createElement("div")

if(filled){

d.className="slot "+(info.wash?"wash-filled":"filled")

d.innerText=[info.tog,info.mat].filter(Boolean).join("\n")

}else{

d.className="slot empty "+kind(s)

d.innerText=s

}

yard.appendChild(d)

})

}

const yard=document.getElementById("yard")

draw(topRow)
draw(midRow)
draw(botRow)

</script>

</body>
</html>

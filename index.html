<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
<title>Skien sporplan iPhone</title>

<style>
:root{
--bg:#f4f5f7;
--card:#fff;
--line:#d3d7dd;
--text:#111827;
--muted:#6b7280;
--blue:#d9eaf7;
--blue-text:#7d97bf;
--yellow:#fff200;
--yellow-text:#9a9100;
--orange:#f3e2d2;
--orange-text:#b97b44;
--grey:#bfbfbf;
--platform:#d99694;
--wash:#fff7b8
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:var(--bg);
}

.app{
max-width:1200px;
margin:auto;
padding:12px;
}

.segmented{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:6px;
margin-bottom:12px;
}

.segmented button{
padding:12px;
border-radius:12px;
border:1px solid #ccc;
background:white;
}

.panel{
display:none;
}

.panel.active{
display:block;
}

.yard-grid{
display:grid;
grid-template-columns:repeat(14,78px);
gap:6px;
}

.slot{
border:2px solid black;
border-radius:7px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
white-space:pre-line;
font-weight:700;
}

.slot.empty.blue{background:#d9eaf7;color:#7d97bf}
.slot.empty.yellow{background:#fff200;color:#9a9100}
.slot.empty.orange{background:#f3e2d2;color:#b97b44}

.slot.filled{
background:#bfbfbf;
}

.slot.wash-filled{
background:#f3e2d2;
}

.platform{
background:#d99694;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}
</style>
</head>

<body>

<div class="app">

<h2>Skien sporplan</h2>

<div class="segmented">
<button onclick="show('sporplan')">Sporplan</button>
<button onclick="show('turneringKveld')">Turnering kveld</button>
<button onclick="show('turneringNatt')">Turnering natt</button>
<button onclick="show('inndata')">Inndata</button>
</div>

<div id="sporplan" class="panel active">
<div class="yard-grid" id="yard"></div>
</div>

<div id="turneringKveld" class="panel">
Turnering kveld
</div>

<div id="turneringNatt" class="panel">
Turnering natt
</div>

<div id="inndata" class="panel">
Inndata
</div>

</div>

<script>

function show(id){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

const slotsTop=["12N","11N","10N","9","8N","7N","platform","6N","5N","4N","3N","platform","2N","1N"]

const slotsMid=["12S","11S","10S",null,"8S","7S","platform","6S","5M","4M","3M","platform","2S","1S"]

const slotsBot=[null,null,null,null,"8SS","7SS","platform","6SS","5S","4S","3S",null,null,null]

function kind(slot){

if(!slot)return

if(slot.endsWith("N")||slot==="9")return"blue"

if(slot.endsWith("M"))return"yellow"

return"orange"

}

const yard=document.getElementById("yard")

function draw(row){

row.forEach(s=>{

if(s==="platform"){
let d=document.createElement("div")
d.className="platform"
d.innerText="Plattform"
yard.appendChild(d)
return
}

if(!s){
let d=document.createElement("div")
yard.appendChild(d)
return
}

let d=document.createElement("div")
d.className="slot empty "+kind(s)
d.innerText=s
yard.appendChild(d)

})

}

draw(slotsTop)
draw(slotsMid)
draw(slotsBot)

</script>

</body>
</html>
